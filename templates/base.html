<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Hosting Calculator{% endblock %}</title>
    <meta name="description" content="{% block description %}Estimate your monthly hosting costs based on resource usage. Calculate credits for AI Inference, Compute, Web Requests, Bandwidth, Form Submissions, and Production Deploys.{% endblock %}">
    <meta name="keywords" content="hosting calculator, billing calculator, credits, pricing, AI inference, compute">
    <meta name="author" content="Hosting Calculator">
    <meta name="theme-color" content="#2e3f99">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Hosting Calculator{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Estimate your monthly hosting costs based on resource usage. Interactive calculator for AI Inference, Compute, Web Requests, Bandwidth, Form Submissions, and Production Deploys.{% endblock %}">
    <meta property="og:url" content="http://hostcalc.va-systems.dev/">
    <meta property="og:image" content="http://hostcalc.va-systems.dev/og-image.png">
    <meta property="og:image:alt" content="Hosting Calculator">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Hosting Calculator{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Estimate your monthly hosting costs based on resource usage.{% endblock %}">
    <meta name="twitter:image" content="http://hostcalc.va-systems.dev/og-image.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sticky Navigation Header -->
    <nav class="navbar">
        <div class="navbar-container">
            <ul class="navbar-menu">
                <li><a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Calculator</a></li>
                <li><a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
                <li><a href="{{ url_for('contact') }}" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}">Contact</a></li>
                <li><a href="{{ url_for('attribution') }}" class="nav-link {% if request.endpoint == 'attribution' %}active{% endif %}">Attribution</a></li>
            </ul>
        </div>
    </nav>

    <!-- Optional Hero Section -->
    {% block hero %}{% endblock %}

    <!-- Main Content Container -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
